<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alt Art Archive</title>
    <style>
      #root {
        height: 100%;
        width: 100%;
      }
    </style>
    <script>
      (function() {
        try {
          // Store original fetch
          const originalFetch = window.fetch;
          
          // Check if fetch is already defined and its descriptor
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          
          // If it's configurable or doesn't exist yet, we can protect it
          if (!descriptor || descriptor.configurable) {
            Object.defineProperty(window, 'fetch', {
              get: function() {
                return originalFetch;
              },
              set: function(val) {
                console.warn('Blocked attempt to overwrite window.fetch');
                // We just ignore the set to prevent the error
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // Fail silently if we can't redefine fetch
          console.warn('Fetch protection could not be initialized:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
