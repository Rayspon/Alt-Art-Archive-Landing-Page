<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alt Art Archive</title>
    <script>
      console.log('HTML Loaded, script starting...');
      (function() {
        try {
          const originalFetch = window.fetch;
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (!descriptor || descriptor.configurable) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function() { console.warn('Something tried to rewrite window.fetch'); },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Fetch protection could not be applied', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div style="height: 100vh; background: #09090B; display: flex; align-items: center; justify-content: center; color: white; font-family: sans-serif; margin: 0;">
        <p>Loading Alt Art Archive...</p>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
