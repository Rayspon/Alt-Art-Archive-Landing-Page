<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alt Art Archive</title>
    <script>
      (function() {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function() { /* Prevent crash from assignment attempts */ },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Fetch protection could not be applied', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
